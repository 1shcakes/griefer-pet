<style>
@font-face {
  font-family: 'PressStart2P-Regular';
  src: url('PressStart2P-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
  .pet-area {
    position: relative;
    display: inline-block;
    cursor: grab;
    user-select: none;
  }
  .pet-area img {
    display: block;
    border-radius: 16px;
    width: 320px;
    pointer-events: none;
    transition: filter 0.2s;
  }
  .pet-area.petting {
  cursor: grabbing;
}  
  .pet-area.petting img {
    filter: brightness(1.08) saturate(1.1);
  }
  .pet-container {
    position: relative;
    width: 320px;
  }
  #petHat {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 15;
    display: none;
  }
    .pet-area:hover .hand {
    display: block;
  }
  .heart {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
    z-index: 20;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(1.4); }
  }
  
  .mood-bar-wrap {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mood-label {
    font-size: 13px;
    color: var(--color-text-secondary);
    min-width: 64px;
  }
  .mood-track {
    flex: 1;
    height: 10px;
    background: var(--color-background-secondary);
    border-radius: 99px;
    border: 0.5px solid var(--color-border-tertiary);
    overflow: hidden;
  }
  .mood-fill {
    height: 100%;
    width: 10%;
    background: linear-gradient(90deg, #f9a8d4, #f472b6);
    border-radius: 99px;
    transition: width 0.3s ease;
  }
  .status {
    margin-top: 10px;
    font-size: 15px;
    color: var(--color-text-primary);
    min-height: 24px;
    text-align: center;
    transition: opacity 0.2s;
  }
  .wrapper {
    padding: 1.5rem 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .image-swap-btns {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  
.swap-btn {
  font-family: 'PressStart2P-Regular', sans-serif;
  font-size: 22px;
  background: white;
  border: 3px solid #6e8662;
  border-radius: 999px;
  padding: 8px 18px;
  cursor: pointer;
  transition: all 0.1s ease;
  box-shadow: 0 4px 0 #6e8662;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.swap-btn:hover {
  background: #d7e0d3;
  transform: translateY(-2px);
  box-shadow: 0 6px 0 #6e8662;
}

.swap-btn:active, .swap-btn.active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #6e8662;
  background: #d7e0d3;
  border-color: #6e8662;
}

#hatToggle {
  border-color: #94a3b8;
  box-shadow: 0 4px 0 #64748b;
}

#hatToggle.active {
  background: #f1f5f9;
  border-color: #475569;
}

.pet-container.swaying {
  animation: sway 0.8s ease-in-out infinite;
  transform-origin: bottom center;
}

@keyframes sway {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}

body {
  font-family: 'PressStart2P-Regular', sans-serif;
  background: repeating-linear-gradient(
    45deg,
    #87a17e, /* LIGHT */
    #87a17e 20px,
    #aecf70 20px, /* DARK */
    #aecf70 40px
  );
  background-size: 56.57px 56.57px;
  animation: scrollBackground 3s linear infinite;
  margin: 0;
  min-height: 100vh;
}

@keyframes scrollBackground {
  from {
    background-position: 0 0;
  }
  to {
    background-position: 56.57px 0;
  }
}

.wrapper {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(4px);
  padding: 2rem;
  border-radius: 24px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  margin-top: 50px;
}
</style>

<audio id="bgMusic" loop preload="auto" style="display: none;"></audio>

<div class="wrapper">
  <div class="image-swap-btns">
    <button class="swap-btn active" data-idx="0" title="Default">D3F@ULT</button>
    <button class="swap-btn" data-idx="1" title="SkinTone">V@R1@NT</button>
    <button class="swap-btn" id="musicToggle">MUS1C</button>
    <button class="swap-btn" id="hatToggle" title="Toggle Hat">T0GGL3 H@T</button>
  </div>
  
  <div class="status" id="status">H0V3R 0V3R M3 T0 G1V3 P3T$!</div>
  
  <div class="pet-area" id="petArea">
    <div class="pet-container">
      <img id="petImg" src="GD_D.png" alt="Pet" draggable="false" />
      <img id="petHat" src="hat.png" alt="Hat Overlay" />
    </div>
  </div>

  <div style="width:320px">
    <div class="mood-bar-wrap">
      <span class="mood-label">H@PP1N3$$</span>
      <div class="mood-track"><div class="mood-fill" id="moodFill"></div></div>
      <span style="font-size:13px;color:var(--color-text-secondary)" id="moodPct">10%</span>
    </div>
  </div>
</div>

<script>
const animals = [
  {
    emoji: "Default",
    imgs: ["GD_D.png","GD_P.png","GD_S.png"],
    hearts: ["🖤","💚","❤️"],
    msgs: {
      petting: ["N0T BAD...", "D0 1T 4G41N.","D0NT G3T US3D 2 TH1S.","W4TCH TH3 L34V3S, PUNK.","1 W1LL B1TE U."],
      highHappiness: ["D0NT ST0P.","UR 4LR1GHT... 1 GU3SS.","D0NT T3LL 4NY0N3 4BOUT TH1S.","M4YB3 1 W0NT GR1EF U 2D4Y."],
      idle: ["W4TCH1NG U...", "ST1LL H3R3?", "H3LL0??","DONT 4CT L1KE U D0NT W4NN4.","UR JUST GONN4 ST4ND TH3R3? ...W34K."]
    },
    missMsg: "WH0 S41D U C0ULD ST0P??"
  },
    {
    emoji: "Variant",
    imgs: ["GST_D.png","GST_P.png","GST_S.png"],
    hearts: ["🖤","💚","❤️"],
    msgs: {
      petting: ["N0T BAD...", "D0 1T 4G41N.","D0NT G3T US3D 2 TH1S.","W4TCH TH3 L34V3S, PUNK.","1 W1LL B1TE U."],
      highHappiness: ["D0NT ST0P.","UR 4LR1GHT... 1 GU3SS.","D0NT T3LL 4NY0N3 4BOUT TH1S.","M4YB3 1 W0NT GR1EF U 2D4Y."],
      idle: ["W4TCH1NG U...", "ST1LL H3R3?", "H3LL0??","DONT 4CT L1KE U D0NT W4NN4.","UR JUST GONN4 ST4ND TH3R3? ...W34K."]
    },
    missMsg: "WH0 S41D U C0ULD ST0P??"
  }
];

let currentAnimal = 0;
let happiness = 10;
let isPetting = false;
let petInterval = null;
let lastMsgIdx = -1;
let hatVisible = false;

const petArea = document.getElementById('petArea');
const moodFill = document.getElementById('moodFill');
const moodPct = document.getElementById('moodPct');
const statusEl = document.getElementById('status');
const petImg = document.getElementById('petImg');
const petHat = document.getElementById('petHat');
const hatBtn = document.getElementById('hatToggle');


// Toggle Hat Logic
hatBtn.addEventListener('click', () => {
  hatVisible = !hatVisible;
  petHat.style.display = hatVisible ? 'block' : 'none';
  hatBtn.classList.toggle('active', hatVisible);
});

// On Load
function setAnimal(idx) {
  currentAnimal = idx;
  const a = animals[idx];
  petImg.src = a.imgs[0];
  happiness = 10;
  updateMood();
  statusEl.textContent = "H0V3R 0V3R M3 T0 G1V3 P3T$!";
  document.querySelectorAll('.swap-btn[data-idx]').forEach((b,i) => b.classList.toggle('active', i===idx));
}

document.querySelectorAll('.swap-btn[data-idx]').forEach(btn => {
  btn.addEventListener('click', () => setAnimal(+btn.dataset.idx));
});

// EVENT LISTENERS //

// On Load
petArea.addEventListener('mouseenter', () => {
  petImg.src = animals[currentAnimal].imgs[1]; 
  petInterval = setInterval(autoPet, 600);
});

// Mouse hovers away
petArea.addEventListener('mouseleave', () => {
  clearInterval(petInterval);
  petArea.classList.remove('petting');
  isPetting = false;
  
  petImg.src = animals[currentAnimal].imgs[2]; 
  
  if (happiness < 20) {
    statusEl.textContent = animals[currentAnimal].missMsg;
    statusEl.style.opacity = "1";
  }

  setTimeout(() => {
    if (!petArea.matches(':hover')) {
      petImg.src = animals[currentAnimal].imgs[0];
      
      statusEl.textContent = "";
    }
  }, 5000);
});

petArea.addEventListener('mousedown', () => {
  isPetting = true;
  petArea.classList.add('petting');
  addHappiness(3);
  showHeart();
  showMsg();
});

petArea.addEventListener('mouseup', () => {
  isPetting = false;
  petArea.classList.remove('petting');
});

// Click to pet
function autoPet() {
  addHappiness(1);
  if (Math.random() > 0.5) showHeart();
  if (Math.random() > 0.6) showMsg();
}

function addHappiness(amt) {
  happiness = Math.min(100, happiness + amt);
  updateMood();
}

function updateMood() {
  moodFill.style.width = happiness + '%';
  moodPct.textContent = Math.round(happiness) + '%';
  // swaying
  const petContainer = document.querySelector('.pet-container');
  if (happiness >= 80) petContainer.classList.add('swaying');
  else petContainer.classList.remove('swaying');
}

function showHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  const a = animals[currentAnimal];
  h.textContent = a.hearts[Math.floor(Math.random() * a.hearts.length)];
  h.style.left = (30 + Math.random() * 260) + 'px';
  h.style.top = (20 + Math.random() * 120) + 'px';
  petArea.appendChild(h);
  setTimeout(() => h.remove(), 1000);
}

function showMsg(type = 'petting') {
  const a = animals[currentAnimal];
  
  let currentList;
  if (type === 'idle') {
    currentList = a.msgs.idle;
  } else if (happiness > 80) {
    currentList = a.msgs.highHappiness;
  } else {
    currentList = a.msgs.petting;
  }

  if (!currentList || currentList.length === 0) return;

  let idx = Math.floor(Math.random() * currentList.length);
  lastMsgIdx = idx;
  
  statusEl.textContent = currentList[idx];
  statusEl.classList.add('visible');

  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(() => {
    if (!isPetting && !petArea.matches(':hover')) {
      statusEl.classList.remove('visible');
    }
  }, 4000);
}

// Decay
setInterval(() => {
  if (!isPetting && !petArea.matches(':hover')) {
    happiness = Math.max(0, happiness - 0.5);
    updateMood();
  }
}, 500);

// Idle message
setInterval(() => {
  if (!isPetting && !petArea.matches(':hover')) {
    

    if (Math.random() > 0.7) {
      showMsg('idle');
    }
  }
}, 10000);

const musicToggle = document.getElementById('musicToggle');
const bgMusic = document.getElementById('bgMusic');

if (musicToggle && bgMusic) {
  let musicPlaying = false;
  bgMusic.volume = 0.4;
  
  bgMusic.addEventListener('error', function(e) {
    console.log('Music file not found - that\'s ok!');
  });
  
  musicToggle.addEventListener('click', function() {
    if (!musicPlaying) {
      if (!bgMusic.src) {
        bgMusic.src = 'moosic.mp3';
      }
      
      bgMusic.play().then(() => {
        musicPlaying = true;
        musicToggle.textContent = 'MUT3';
        musicToggle.classList.add('active');
        if (typeof statusEl !== 'undefined') {
          statusEl.textContent = 'B3ST TR4CK 1N TH3 G4M3. 0BV10USLY.';
          setTimeout(() => {
            if (statusEl.textContent === 'B3ST TR4CK 1N TH3 G4M3. 0BV10USLY.') statusEl.textContent = '';
          }, 1500);
        }
      }).catch(function(error) {
        console.log('Play error:', error);
        if (typeof statusEl !== 'undefined') {
          statusEl.textContent = 'CL1CK 4 P3T F1RST. TH3N W3 T4LK MUS1C. C4P1SCHE?';
        }
      });
    } else {
      bgMusic.pause();
      musicPlaying = false;
      musicToggle.textContent = 'MUS1C';
      musicToggle.classList.remove('active');
      if (typeof statusEl !== 'undefined') {
        statusEl.textContent = 'RUUUD3.';
        setTimeout(() => {
          if (statusEl.textContent === 'RUUUD3.') statusEl.textContent = '';
        }, 1500);
      }
    }
  });
}
</script>
